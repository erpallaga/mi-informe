<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="black" stroke-width="6"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#9ca3af" stroke-width="3"/>
  <!-- Upper hourglass triangle (empty) -->
  <polygon points="55,44 145,44 100,100" fill="white" stroke="black" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Lower hourglass triangle (sand) -->
  <polygon points="55,156 145,156 100,100" fill="#c0c0c0" stroke="black" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Small sand residue at the neck -->
  <polygon points="88,92 112,92 100,100" fill="#c0c0c0"/>
  <!-- Top horizontal line -->
  <line x1="55" y1="44" x2="145" y2="44" stroke="black" stroke-width="5"/>
  <!-- Bottom horizontal line -->
  <line x1="55" y1="156" x2="145" y2="156" stroke="black" stroke-width="5"/>
</svg>
